name: "🚀 NPM Publish"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    name: "Publish to npm"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Test
        run: npm test

      - name: Validate package contents
        run: npm pack --dry-run

      - name: Check npm version
        if: github.event_name != 'pull_request'
        id: npm-version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "create-atomic-resources@$PACKAGE_VERSION" version > /dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "create-atomic-resources@$PACKAGE_VERSION is already published"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "create-atomic-resources@$PACKAGE_VERSION is not published yet"
          fi

      - name: Check npm auth token
        if: github.event_name != 'pull_request' && steps.npm-version.outputs.published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error title=Missing NPM_TOKEN::Add an npm automation token as the NPM_TOKEN repository secret."
            exit 1
          fi
          npm whoami --registry=https://registry.npmjs.org/

      - name: Explain first publish requirements
        if: github.event_name != 'pull_request' && steps.npm-version.outputs.published == 'false'
        run: |
          echo "Publishing a new package name requires an npm token that can create packages."
          echo "If npm publish returns E404 for PUT /create-atomic-resources, replace NPM_TOKEN with an npm automation token from the owning npm account."

      - name: Publish
        if: github.event_name != 'pull_request' && steps.npm-version.outputs.published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance
